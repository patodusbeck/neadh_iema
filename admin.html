<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Painel NEADH | Den&uacute;ncias</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#4d2326">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Painel NEADH">
  <link rel="manifest" href="admin-manifest.webmanifest">
  <link rel="icon" type="image/png" href="assets/images/ipcarolina.png">
  <link rel="apple-touch-icon" href="assets/icons/pwa-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="panel">
    <header class="panel-head">
      <div class="brand">
        <img src="assets/images/ipcarolina.png" alt="S&iacute;mbolo do NEADH" width="42" height="40">
        <h1>Painel de Den&uacute;ncias - NEADH</h1>
      </div>
      <!-- <a class="back-link" href="/">Voltar ao site</a>-->
    </header>

    <section class="auth-box" id="authBox">
      <label for="adminKey">Chave de acesso do diretor</label>
      <div class="auth-row">
        <input id="adminKey" type="password" placeholder="Digite a chave ADMIN_PANEL_KEY">
        <button id="loadReports">Carregar den&uacute;ncias</button>
      </div>
      <p id="authMessage" role="status" aria-live="polite"></p>
    </section>

    <section class="toolbar">
      <button id="installApp" hidden>Instalar app</button>
      <button id="refreshReports" disabled>Atualizar lista</button>
      <button id="changeKey" hidden>Sair</button>
      <p id="summary"></p>
    </section>

    <section id="reportsList" class="reports-list"></section>
  </main>

  <section id="detailOverlay" class="detail-overlay is-hidden" aria-hidden="true">
    <article class="detail-card" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <button id="closeDetail" class="close-detail" type="button" aria-label="Fechar detalhe">Fechar</button>
      <h2 id="detailTitle"></h2>
      <div class="detail-grid" aria-label="Informações da denúncia">
        <p id="detailStatus" class="meta"></p>
        <p id="detailType" class="meta"></p>
        <p id="detailLocal" class="meta"></p>
        <p id="detailWhen" class="meta"></p>
        <p id="detailInvolved" class="meta"></p>
        <p id="detailName" class="meta"></p>
        <p id="detailContact" class="meta"></p>
      </div>
      <p id="detailDesc" class="desc"></p>
      <p id="detailProtocol" class="meta"></p>
    </article>
  </section>

  <script src="admin.js" defer></script>
</body>
</html>
